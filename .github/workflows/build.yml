name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app

    - name: Build
      run: |
        xcodebuild \
          -project LicenseGen.xcodeproj \
          -scheme LicenseGen \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          ONLY_ACTIVE_ARCH=NO \
          clean build
    - name: Verify icons in app bundle
      run: |
        echo "=== App bundle contents ==="
        ls build/Build/Products/Release-iphoneos/LicenseGen.app/
        echo "=== Assets.car check ==="
        ls build/Build/Products/Release-iphoneos/LicenseGen.app/Assets.car && echo "Assets.car EXISTS" || echo "Assets.car NOT FOUND"

    - name: Package IPA
      run: |
        mkdir -p Payload
        cp -r build/Build/Products/Release-iphoneos/LicenseGen.app Payload/
        zip -r LicenseGen.ipa Payload
        ls -lh LicenseGen.ipa

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: LicenseGen-IPA
        path: LicenseGen.ipa
        retention-days: 30
    
